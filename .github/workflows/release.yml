name: publish

# Build and publish a (draft) GitHub Release whenever a version tag is pushed,
# e.g.  git tag app-v0.1.0 && git push origin app-v0.1.0
# Can also be run manually from the Actions tab.
on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:

jobs:
  # Gate the (expensive) platform builds on the tag version matching the version
  # declared in package.json and tauri.conf.json. Only major.minor.patch is
  # compared: a 4th version component and any -prerelease suffix on the tag are
  # ignored (e.g. app-v0.1.0.2 and app-v0.1.0-beta.1 both require 0.1.0).
  version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: verify package + tauri.conf versions match the tag
        if: github.ref_type == 'tag'
        run: |
          norm() {
            # major.minor.patch only: drop -prerelease, keep first 3 numbers.
            local v="${1%%-*}"
            IFS='.' read -r a b c _ <<< "$v"
            echo "${a:-0}.${b:-0}.${c:-0}"
          }
          tag_ver="$(norm "${GITHUB_REF_NAME#app-v}")"
          pkg_ver="$(norm "$(jq -r .version package.json)")"
          conf_ver="$(norm "$(jq -r .version src-tauri/tauri.conf.json)")"
          echo "tag=$tag_ver  package.json=$pkg_ver  tauri.conf.json=$conf_ver"
          fail=0
          if [ "$pkg_ver" != "$tag_ver" ]; then
            echo "::error::package.json version ($pkg_ver) does not match tag ($tag_ver)"
            fail=1
          fi
          if [ "$conf_ver" != "$tag_ver" ]; then
            echo "::error::src-tauri/tauri.conf.json version ($conf_ver) does not match tag ($tag_ver)"
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            echo "Bump the version in both files to match the tag, then re-tag."
            exit 1
          fi
          echo "Versions match the tag ($tag_ver)."

  publish-tauri:
    needs: version-guard
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Apple Silicon (M1 and above)
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # Intel macs
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # Linux x64
            args: ""
          - platform: "ubuntu-22.04-arm" # Linux Arm64 (public repos only)
            args: ""
          - platform: "windows-latest" # Windows x64
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true # pull the real .sqlite DB and icon sheets, not LFS pointers

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # These targets are only used on the macOS runners.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # The action replaces __VERSION__ with the version in tauri.conf.json.
          tagName: app-v__VERSION__
          releaseName: "EQL Loot Filter Manager v__VERSION__"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
