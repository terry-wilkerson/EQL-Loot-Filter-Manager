name: ci

# Type-check, build, and test on every push and pull request to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fail fast if a file that should live in Git LFS (the sqlite catalog or an
  # icon sprite sheet) was committed as a raw blob instead of an LFS pointer.
  lfs-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7 # default (lfs: false) is fine — we only read pointers
      - name: verify LFS-tracked assets are not committed raw
        run: |
          set -e
          mapfile -t tracked < <(git ls-files 'public/icons/*.png' '*.sqlite')
          mapfile -t lfs < <(git lfs ls-files -n)
          violations=0
          for f in "${tracked[@]}"; do
            [ -z "$f" ] && continue
            if ! printf '%s\n' "${lfs[@]}" | grep -qxF -- "$f"; then
              echo "::error file=$f::$f is committed as a raw blob but must be stored via Git LFS"
              violations=1
            fi
          done
          if [ "$violations" -ne 0 ]; then
            echo "Assets above bypassed Git LFS. Fix with:"
            echo "  git lfs migrate import --include=\"*.sqlite,public/icons/*.png\""
            exit 1
          fi
          echo "OK: all .sqlite and public/icons PNG assets are stored via Git LFS."

  # Catch version drift early: package.json and tauri.conf.json must agree on
  # major.minor.patch (a 4th component or -prerelease suffix is ignored). The
  # release workflow additionally checks these against the tag at publish time.
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: package.json and tauri.conf.json versions agree
        run: |
          norm() {
            local v="${1%%-*}"
            IFS='.' read -r a b c _ <<< "$v"
            echo "${a:-0}.${b:-0}.${c:-0}"
          }
          pkg_ver="$(norm "$(jq -r .version package.json)")"
          conf_ver="$(norm "$(jq -r .version src-tauri/tauri.conf.json)")"
          echo "package.json=$pkg_ver  tauri.conf.json=$conf_ver"
          if [ "$pkg_ver" != "$conf_ver" ]; then
            echo "::error::package.json ($pkg_ver) and src-tauri/tauri.conf.json ($conf_ver) versions disagree"
            echo "Update both files to the same version."
            exit 1
          fi
          echo "Versions agree ($pkg_ver)."

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"
      - name: install dependencies
        run: npm ci
      - name: type-check + build
        run: npm run build
      - name: unit tests
        run: npm test

  backend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml
